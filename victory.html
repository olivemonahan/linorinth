<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory!</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bigshot+One&family=IM+Fell+Double+Pica&family=Inter:wght@400&display=swap" rel="stylesheet">

    <script src="translations.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Victory Canvas Frame Container */
        .victory-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 (Background Blur Glow) */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2);
            top: -178px;
            bottom: 510px;
            background: #D9D9D9;
            filter: blur(150px);
            pointer-events: none;
        }

        /* MATCHED FIX 1: Transformed container card into a vertical flex column layout */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        /* MATCHED FIX 2: Relativized logo asset header */
        .logo-vector {
            width: 201px;
            height: 54px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        /* MATCHED FIX 3: Removed static bounding box properties to allow native title flow */
        .victory-main-title {
            font-size: 36px;
            line-height: 45px;
            text-align: center;
            letter-spacing: 0.05em;
            color: #14325C;
            margin-bottom: 4px;
            font-weight: 400;
        }

        /* MATCHED FIX 4: Cleaned text block for auto layout spacing */
        .victory-sub-phrase {
            font-size: 18px;
            line-height: 25px;
            text-align: center;
            color: #14325C;
            max-width: 260px;
            margin-bottom: 20px;
        }

        /* MATCHED FIX 5: Relativized green ticket block container */
        .admission-ticket-box {
            box-sizing: border-box;
            width: 296px;
            height: 140px;
            background: #9ACF71;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 34px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin-bottom: auto; /* Dynamically pushes subsequent QR elements down uniformly */
            flex-shrink: 0;
        }

        /* Admission Instruction Text inside Box */
        .admission-instruction-text {
            font-size: 20px;
            line-height: 26px;
            text-align: center;
            color: #14325C;
        }

        /* MATCHED FIX 6: Integrated footer graphic safely into the flow without absolute layers */
        .footer-qr-container {
            width: 150px;
            height: 150px;
            background-image: url('decorative_assets/default_QR.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center center;
            background-color: #ffffff;
            border: 3px dashed rgba(20, 50, 92, 0.2);
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.06);
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        /* Hidden Layer Fallbacks from Specs */
        .hidden-figma-layer {
            position: absolute;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="victory-container">
    <div class="blur-bg-ellipse"></div>

    <div class="inner-panel-card">

        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <h1 class="victory-main-title" data-i18n="victory_title">VICTORY!</h1>

        <p class="victory-sub-phrase" data-i18n="victory_subtitle">You made it to the end!</p>

        <div class="admission-ticket-box">
            <div class="admission-instruction-text" data-i18n="admission_instruction">
                Walk to the Palace Gates and show the staff this screen to enter!
            </div>
        </div>

        <div class="footer-qr-container"></div>

        <div class="hidden-figma-layer" style="top: 280px; font-family: 'Bigshot One'; font-size: 96px;">1</div>
        <div class="hidden-figma-layer" style="top: 428px; font-size: 20px;">IN LINE</div>

    </div>
</div>

</body>
</html>

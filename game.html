<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Linorinth - Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">

  <script src="translations.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'IM Fell Double Pica', serif;
      color: #1C355E;
    }
    #app-frame {
      position: relative;
      background-color: #D5E6ED;
      border-radius: 36px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    canvas { display: block; touch-action: none; }

    .paused-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #C1DEE4;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .resume-game-overlay-link {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 120;
      cursor: pointer;
    }

    .blur-bg-ellipse {
      position: absolute;
      width: 227px;
      left: calc(50% - 227px/2 + 3px);
      top: -164px;
      bottom: 496px;
      background: rgba(255, 255, 255, 0.8);
      filter: blur(150px);
      pointer-events: none;
      z-index: 10;
    }

    .inner-panel-card {
      position: absolute;
      width: calc(100% - 22px);
      height: calc(100% - 22px);
      left: 11px;
      top: 10px;
      background: #D3E8EC;
      border-radius: 30px;
    }

    .logo-vector {
      position: absolute;
      width: 201.16px;
      height: 54.35px;
      left: 50%;
      transform: translateX(-50%);
      top: 49.28px;
    }

    .game-paused-title {
      position: absolute;
      width: 260px;
      height: 50px;
      left: calc(50% - 260px/2);
      top: 130px;
      font-style: normal;
      font-weight: 400;
      font-size: 32px;
      line-height: 40px;
      text-align: center;
      color: #14325C;
    }

    .play-polygon-icon {
      box-sizing: border-box;
      position: absolute;
      width: 100px;
      height: 100px;
      left: calc(50% - 100px/2);
      top: 166px;
      background: #F9B271;
      border: 5px solid rgba(255, 255, 255, 0.15);
      transform: rotate(90deg);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* --- ADJUSTED PAUSE OVERLAY STYLES --- */

    .tutorial-steps {
      position: absolute;
      left: 0;
      width: 100%;
      top: 250px;
    }

    .tutorial-row {
      position: relative;
      min-height: 80px;
    }

    .step-text {
      position: absolute;
      width: 250px;
      font-size: 15px;
      line-height: 70px;
      color: #14325C;
      white-space: nowrap;
    }

    .tutorial-row.left .step-text {
      left: 30px;
      text-align: left;
    }

    .tutorial-row.right .step-text {
      right: 30px;
      text-align: right;

      right: 30px;

      left: 30px;
      top: 40px;

  }

  .project-img-3 {
    width: 165px;
    height: 77px;

    background: url('decorative_assets/escape.png') center/contain no-repeat;

    width: 44px;
    height: 58px;
    flex-shrink: 0;
    background: url('decorative_assets/enter_palace.png') center/contain no-repeat;
  }

    .resume-instruction {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: rgba(20, 50, 92, 0.6);

    }

    /* --- NEW KEY BUTTON & SYMBOLS OVERLAY STYLES --- */

    .view-key-btn {
      position: absolute;
      bottom: 65px;
      left: 50%;
      transform: translateX(-50%);

      background: #14325C;
      color: #C1DEE4;
      border: none;
      border-radius: 22px;
      font-family: 'IM Fell Double Pica', serif;
      font-size: 17px;
      letter-spacing: 0.05em;

      box-shadow: 0 4px 10px rgba(0,0,0,0.15);

    }

    .view-key-btn:hover {
      background: #1c437a;
    }

    .hidden {
      display: none !important;
    }

    /* Structural wrapper matches .paused-container */
    .key-page-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #C1DEE4;
      overflow: hidden;
      font-family: 'IM Fell Double Pica', serif;
    }

    /* Text header properties matching .game-paused-title */
    .key-text-header {
      position: absolute;
      width: 260px;
      height: 40px;
      left: calc(50% - 260px/2);
      top: 115px;
      font-family: 'IM Fell Double Pica', serif;
      font-style: normal;
      font-weight: 400;
      font-size: 32px;
      line-height: 40px;
      text-align: center;
      letter-spacing: 0.05em;
      color: #14325C;
    }

    .key-text-sub {
      position: absolute;
      width: 260px;
      height: 25px;
      left: calc(50% - 260px/2);
      top: 160px;
      font-family: 'IM Fell Double Pica', serif;
      font-style: normal;
      font-weight: 400;
      font-size: 20px;
      line-height: 25px;
      text-align: center;
      letter-spacing: 0.05em;
      color: #14325C;
    }

    /* List Container absolute tracking positions (Matches your Step Texts vertical flow) */
    .key-list-wrapper {
      position: absolute;
      width: 260px;
      height: 430px;
      left: calc(50% - 260px/2);
      top: 220px;
    }

    /* Explicit item block rows separated symmetrically to handle labels cleanly */
    .key-row-item {
      position: absolute;
      width: 100%;
      height: 60px;
      display: flex;
      align-items: center;
    }

    /* Individual item offsets calculated to reflect standard layout grids */
    .key-row-item:nth-child(1) { top: 0; }
    .key-row-item:nth-child(2) { top: 86px; }
    .key-row-item:nth-child(3) { top: 172px; }
    .key-row-item:nth-child(4) { top: 258px; }
    .key-row-item:nth-child(5) { top: 344px; }

    .key-symbol-box {
      box-sizing: border-box;
      width: 60px;
      height: 60px;
      border: 1px solid #14325C;
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-origin: content-box;
    }

    .key-symbol-label {
      margin-left: 24px;
      font-family: 'IM Fell Double Pica', serif;
      font-style: normal;
      font-weight: 400;
      font-size: 20px;
      line-height: 60px;
      color: #14325C;
      letter-spacing: 0.05em;
    }
  </style>

<body>

<div id="app-frame">
  <canvas id="c"></canvas>

  <div id="pause-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;">

      <div class="inner-panel-card">

      <div class="inner-panel-card">
        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <div class="key-text-header" data-i18n="key_header">KEY</div>
        <div class="key-text-sub" data-i18n="key_sub">TO GAME SYMBOLS</div>

        <div class="key-list-wrapper">
          <div class="key-row-item">
            <div class="key-symbol-box" style="background-image: url('decorative_assets/symbols_assets/minitheseus.png');"></div>

          </div>
          <div class="key-row-item">
            <div class="key-symbol-box" style="background-image: url('decorative_assets/symbols_assets/minitaur.png');"></div>
            <span class="key-symbol-label" data-i18n="symbol_minotaur">MINOTAUR</span>
          </div>
          <div class="key-row-item">
            <div class="key-symbol-box" style="background-image: url('decorative_assets/symbols_assets/traps.png');"></div>
            <span class="key-symbol-label" data-i18n="symbol_traps">TRAPS</span>
          </div>
          <div class="key-row-item">
            <div class="key-symbol-box" style="background-image: url('decorative_assets/symbols_assets/sword.png');"></div>
            <span class="key-symbol-label" data-i18n="symbol_sword">SWORD</span>
          </div>
          <div class="key-row-item">
            <div class="key-symbol-box" style="background-image: url('decorative_assets/symbols_assets/thread.png');"></div>

        <div class="resume-instruction" data-i18n="tap_resume">TAP ANYWHERE TO RESUME GAME</div>

  <script>
    'use strict';

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const ASPECT = 390 / 844;
    let W, H;

    function resizeAppFrame() {
      if (window.innerHeight * ASPECT <= window.innerWidth) { H = window.innerHeight; W = Math.floor(H * ASPECT); }
      else { W = window.innerWidth; H = Math.floor(W / ASPECT); }
      const frame = document.getElementById('app-frame');
      frame.style.width = W + 'px';
      frame.style.height = H + 'px';
      canvas.width = W; canvas.height = H;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    }
    window.addEventListener('resize', resizeAppFrame);
    resizeAppFrame();

    const QUEUE_H = Math.max(24, Math.floor(H * 0.034));
    const GAME_H_CUTSCENE = Math.floor(H * 0.7525);
    const GAME_H_FULL = H;

    let GAME_H = GAME_H_CUTSCENE;
    let CTRL_H = H - GAME_H;

    function updateLayout(){
      GAME_H =
              (gameState === 'INTRO' || gameState === 'ARIADNE')
                      ? GAME_H_CUTSCENE
                      : GAME_H_FULL;

      CTRL_H = H - GAME_H;
    }
    const CELL = Math.floor(W / 11);
    const COLS = 23, ROWS = 23;
    const MAZE_W = COLS * CELL, MAZE_H = ROWS * CELL;

    const maze = new Uint8Array(ROWS * COLS);
    function idx(r, c) { return r * COLS + c; }

    let spawnRoom = {side:'top', r0:0, c0:0};

    function generateMaze() {
      maze.fill(0);
      const visited = new Uint8Array(ROWS * COLS);
      const stack = [0]; visited[0] = 1;
      const dirs = [{dr:-1,dc:0,bit:1,ob:4},{dr:0,dc:1,bit:2,ob:8},{dr:1,dc:0,bit:4,ob:1},{dr:0,dc:-1,bit:8,ob:2}];
      while (stack.length) {
        const top = stack[stack.length-1], r = Math.floor(top/COLS), c = top%COLS;
        const sh = dirs.slice().sort(() => Math.random()-0.5);
        let moved = false;
        for (const d of sh) {
          const nr=r+d.dr, nc=c+d.dc;
          if (nr<0||nr>=ROWS||nc<0||nc>=COLS||visited[idx(nr,nc)]) continue;
          maze[idx(r,c)]|=d.bit; maze[idx(nr,nc)]|=d.ob;
          visited[idx(nr,nc)]=1; stack.push(idx(nr,nc)); moved=true; break;
        }
        if (!moved) stack.pop();
      }

      // Braid: knock down most dead ends to add loops so the player has
      // more routes around the Minotaur instead of getting cornered.
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = idx(r, c);
          const degree = (maze[cell]&1?1:0)+(maze[cell]&2?1:0)+(maze[cell]&4?1:0)+(maze[cell]&8?1:0);
          if (degree !== 1) continue;
          if (Math.random() < 0.95) continue;
          const candidates = [];
          for (const d of DMAP) {
            const nr = r+d.dr, nc = c+d.dc;
            if (nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
            if (maze[cell] & d.bit) continue;
            candidates.push(d);
          }
          if (!candidates.length) continue;
          const d = candidates[Math.floor(Math.random()*candidates.length)];
          const ob = d.bit===1?4 : d.bit===2?8 : d.bit===4?1 : 2;
          maze[cell] |= d.bit;
          maze[idx(r+d.dr, c+d.dc)] |= ob;
        }
      }

      const _sides = ['top','bottom','left','right'];
      const _side  = _sides[Math.floor(Math.random()*4)];
      const _sr0   = _side==='top' ? 0 : _side==='bottom' ? ROWS-2 : Math.floor(Math.random()*(ROWS-1));
      const _sc0   = _side==='left' ? 0 : _side==='right' ? COLS-2 : Math.floor(Math.random()*(COLS-1));
      spawnRoom.side = _side; spawnRoom.r0 = _sr0; spawnRoom.c0 = _sc0;

      maze[idx(_sr0,  _sc0)]   |= 2|4;
      maze[idx(_sr0,  _sc0+1)] |= 4|8;
      maze[idx(_sr0+1,_sc0)]   |= 1|2;
      maze[idx(_sr0+1,_sc0+1)] |= 1|8;
      if(_side==='top')    { maze[idx(_sr0+1,_sc0+1)]|=4; maze[idx(_sr0+2,_sc0+1)]|=1; }
      if(_side==='bottom') { maze[idx(_sr0,  _sc0+1)]|=1; maze[idx(_sr0-1,_sc0+1)]|=4; }
      if(_side==='left')   { maze[idx(_sr0+1,_sc0+1)]|=2; maze[idx(_sr0+1,_sc0+2)]|=8; }
      if(_side==='right')  { maze[idx(_sr0+1,_sc0)]  |=8; maze[idx(_sr0+1,_sc0-1)]|=2; }
    }

    const DMAP = [{dr:-1,dc:0,bit:1},{dr:0,dc:1,bit:2},{dr:1,dc:0,bit:4},{dr:0,dc:-1,bit:8}];

    generateMaze();

    function bfs(sr, sc, er, ec) {
      const prev = new Int16Array(ROWS*COLS).fill(-1), vis = new Uint8Array(ROWS*COLS);
      const q = [idx(sr,sc)]; vis[idx(sr,sc)] = 1;
      let head = 0; const tgt = idx(er,ec);
      while (head < q.length) {
        const cur = q[head++]; if (cur===tgt) break;
        const r=Math.floor(cur/COLS), c=cur%COLS;
        for (const d of DMAP) {
          if (!(maze[cur]&d.bit)) continue;
          const ni = idx(r+d.dr, c+d.dc);
          if (!vis[ni]) { vis[ni]=1; prev[ni]=cur; q.push(ni); }
        }
      }
      const path=[]; let cur=tgt; while(cur!==-1){path.unshift(cur);cur=prev[cur];} return path;
    }

    function bfsDist(sr, sc) {
      const dist = new Int16Array(ROWS*COLS).fill(-1);
      dist[idx(sr,sc)] = 0;
      const q = [idx(sr,sc)]; let head = 0;
      while (head < q.length) {
        const cur = q[head++];
        const r=Math.floor(cur/COLS), c=cur%COLS;
        for (const d of DMAP) {
          if (!(maze[cur]&d.bit)) continue;
          const ni = idx(r+d.dr, c+d.dc);
          if (dist[ni]===-1) { dist[ni]=dist[cur]+1; q.push(ni); }
        }
      }
      return dist;
    }

    function bfsRunAway(mr, mc, pr, pc) {
      const playerDist = bfsDist(pr, pc);
      let maxD = -1, tr = mr, tc = mc;
      for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
        const d = playerDist[idx(r,c)];
        if (d > maxD) { maxD=d; tr=r; tc=c; }
      }
      return bfs(mr, mc, tr, tc);
    }

    function releaseJoy(){
      dragInput.active = false;
    }

    function drawTheseusFigure(x,y,s,facing,isTheseus,walkPhase=0){
      const img = isTheseus
              ? (facing==='left' ? swordLeftImg : swordRightImg)
              : (facing==='left' ? bodyLeftImg  : bodyRightImg);
      const loaded = isTheseus
              ? (facing==='left' ? swordLeftLoaded : swordRightLoaded)
              : (facing==='left' ? bodyLeftLoaded  : bodyRightLoaded);

      if (!loaded) {
        drawStickFigure(x,y,s,'#D5E6ED',walkPhase);
        if (isTheseus) drawSwordOnFigure(x,y,s);
        return;
      }

      const h = s*5;
      const w = h * (img.naturalWidth / img.naturalHeight);
      ctx.drawImage(img, x - w/2, y + s*1.5 - h, w, h);
    }

    function cellCenter(r,c) { return {x:c*CELL+CELL/2, y:r*CELL+CELL/2}; }
    function worldToCell(x,y) {
      return {r:Math.max(0,Math.min(ROWS-1,Math.floor(y/CELL))), c:Math.max(0,Math.min(COLS-1,Math.floor(x/CELL)))};
    }
    function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }

    const PLAYER_R=CELL*0.28, MINO_R=CELL*0.33;
    let playerSpawn, swordSpawn, minoSpawn;
    function initSpawns(){
      playerSpawn = {x:(spawnRoom.c0+1)*CELL, y:(spawnRoom.r0+1)*CELL};
      swordSpawn  = randomSpawn([playerSpawn], ROWS/3);
      minoSpawn   = randomSpawn([playerSpawn, swordSpawn], ROWS/4);
    }

    function randomSpawn(others=[], minCells=0) {
      for (let a=0; a<2000; a++) {
        const r=Math.floor(Math.random()*ROWS), c=Math.floor(Math.random()*COLS);
        const {x,y}=cellCenter(r,c);
        let ok=true;
        for (const o of others) if (dist(x,y,o.x,o.y)<minCells*CELL){ok=false;break;}
        if (ok) return {x,y};
      }
      return cellCenter(Math.floor(ROWS/2),Math.floor(COLS/2));
    }

    initSpawns();

    const TRIVIA_IMG_QUEENS = "decorative_assets/queens_megaron.jpg";
    const TRIVIA_IMG_KINGS = "decorative_assets/throne_room.jpg";

    const TRIVIA_QUESTIONS = [
      { q: 'What does "labrys" refer to?',
        opts: ["Single-headed axe", "Double-headed axe", "Labyrinth", "Palace"], a: 1 },
      { q: "Which animal held the greatest symbolic and religious significance to the Minoans?",
        opts: ["Bull", "Horse", "Bobcat", "Boar"], a: 0 },
      { q: "From which mountain did the inhabitants of Knossos Palace obtain fresh water through aqueducts?",
        opts: ["Mount Zeus", "Mount Ida", "Mount Juktas", "Mount Olympus"], a: 2 },
      { q: "During what period was Knossos Palace first built?",
        opts: ["Stone Age", "Bronze Age", "Dark Ages", "Classical Period"], a: 1 },
      { q: "How many main entrance points did Knossos Palace have?",
        opts: ["1", "2", "3", "4"], a: 3 },
      { q: "About how old is Knossos Palace (in years)?",
        opts: ["2,000", "4,000", "5,000", "8,000"], a: 1 },
      { q: "Who built Knossos Palace?",
        opts: ["Minoans", "Spartans", "Athenians", "Sumerians"], a: 0 },
      { q: "What was the reason for the second construction of the palace in 1700 BCE?",
        opts: ["Earthquake", "Tsunami", "Flood", "Avalanche"], a: 0 },
      { q: "What room is this in Knossos Palace?",
        opts: ["Throne Room", "Queen's Megaron", "The Washroom", "The Dining Room"], a: 0,
        img: TRIVIA_IMG_KINGS },
      { q: "What room is this in Knossos Palace?",
        opts: ["Throne Room", "Queen's Megaron", "The Washroom", "The Dining Room"], a: 1,
        img: TRIVIA_IMG_QUEENS },
      { q: "Who was the ruler of the Minoans?",
        opts: ["King Minos", "Zeus", "The Minotaur", "Poseidon"], a: 0 },
      { q: "Who eventually slays the Minotaur in the myth of the labyrinth?",
        opts: ["Poseidon", "Theseus", "An Athenian", "King Minos"], a: 1 },
      { q: "The Minotaur, according to myth, has...",
        opts: ["Body of a man, head of a bull", "Head of a man, body of a bull", "Head of a horse, body of a bull", "Head of a god, body of a man"], a: 0 },
      { q: "RIDDLE: I am strong and horned, I appear in art and leap through air, I was sacred to the people here. What am I?",
        opts: ["Bull", "Deer", "Goat", "Rhino"], a: 0 },
      { q: "RIDDLE: With trident raised, I stir the sea, Earthquakes follow easily. Who am I?",

    function cellWalls(r, c) {
      const walls=[], x=c*CELL, y=r*CELL, cell=maze[idx(r,c)];
      if(!(cell&1)) walls.push([x,y,x+CELL,y]);
      if(!(cell&2)) walls.push([x+CELL,y,x+CELL,y+CELL]);
      if(!(cell&4)) walls.push([x,y+CELL,x+CELL,y+CELL]);
      if(!(cell&8)) walls.push([x,y,x,y+CELL]);
      return walls;
    }
    function circleVsSeg(cx,cy,cr,x1,y1,x2,y2){
      const fillX=x2-x1,fillY=y2-y1,len2=fillX*fillX+fillY*fillY;
      let t=((cx-x1)*fillX+(cy-y1)*fillY)/len2; t=Math.max(0,Math.min(1,t));
      const dx=x1+t*fillX-cx,dy=y1+t*fillY-cy,d=Math.sqrt(dx*dx+dy*dy);
      if(d<cr&&d>1e-6) return {nx:dx/d,ny:dy/d,pen:cr-d};
      return null;
    }
    function isDoorWall(x1,y1,x2,y2){
      const {side,r0,c0}=spawnRoom;
      if(side==='top')    return y1===0     && y2===0     && x1>=c0*CELL && x2<=(c0+2)*CELL;
      if(side==='bottom') return y1===MAZE_H && y2===MAZE_H && x1>=c0*CELL && x2<=(c0+2)*CELL;
      if(side==='left')   return x1===0     && x2===0     && y1>=r0*CELL && y2<=(r0+2)*CELL;
      if(side==='right')  return x1===MAZE_W && x2===MAZE_W && y1>=r0*CELL && y2<=(r0+2)*CELL;
      return false;
    }
    function inDoorZone(ent){
      const {side,r0,c0}=spawnRoom;
      if(side==='top'||side==='bottom') return ent.x>=c0*CELL && ent.x<=(c0+2)*CELL;
      return ent.y>=r0*CELL && ent.y<=(r0+2)*CELL;
    }
    function resolveWalls(ent){
      const{r,c}=worldToCell(ent.x,ent.y);
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        const nr=r+dr,nc=c+dc;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS) continue;
        for(const[x1,y1,x2,y2] of cellWalls(nr,nc)){
          if((minoKilled || ariadnePhase==='escape') && isDoorWall(x1,y1,x2,y2)) continue;
          const col=circleVsSeg(ent.x,ent.y,ent.r,x1,y1,x2,y2);
          if(col){ent.x-=col.nx*col.pen;ent.y-=col.ny*col.pen;}
        }
      }
      const canExit=(minoKilled || ariadnePhase==='escape') && inDoorZone(ent);
      const {side}=spawnRoom;
      ent.x=Math.max(canExit&&side==='left'  ?-ent.r*4:ent.r, Math.min(canExit&&side==='right' ?MAZE_W+ent.r*4:MAZE_W-ent.r, ent.x));
      ent.y=Math.max(canExit&&side==='top'   ?-ent.r*4:ent.r, Math.min(canExit&&side==='bottom'?MAZE_H+ent.r*4:MAZE_H-ent.r, ent.y));
    }

    function startIntro() {
      const entryR = spawnRoom.r0 + 1, entryC = spawnRoom.c0 + 1;
      const dmap = bfsDist(entryR, entryC);

      // Find cells 22-32 steps from entrance for a longer, more dramatic chase
      let candidates = [];
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const d = dmap[idx(r, c)];
        if (d >= 22 && d <= 32) candidates.push({r, c});
      }
      if (!candidates.length) {
        let best = {r: entryR, c: entryC}, bestD = 0;
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
          if (dmap[idx(r,c)] > bestD) { bestD = dmap[idx(r,c)]; best = {r, c}; }
        }
        candidates = [best];
      }
      const startCell = candidates[Math.floor(Math.random() * candidates.length)];
      const playerPath = bfs(startCell.r, startCell.c, entryR, entryC);

      // Player starts 2 cells ahead on the path so mino is close behind at the start
      const MINO_HEAD = 2;
      const minoCell = playerPath[0];
      const pCell = playerPath[Math.min(MINO_HEAD, playerPath.length - 1)];
      const minoStart = cellCenter(Math.floor(minoCell/COLS), minoCell%COLS);
      const pStart   = cellCenter(Math.floor(pCell/COLS),    pCell%COLS);

      player.x = pStart.x;   player.y = pStart.y;   player.isTheseus = false;
      mino.x   = minoStart.x; mino.y   = minoStart.y; mino.path = []; mino.pathTimer = 0;
      heartPhase = 0;

      introAnim = { playerPath, playerPathPos: MINO_HEAD, elapsed: 0, textAlpha: 0 };
    }

    const PLAYER_SPEED=CELL*3.8, MINO_SPEED=CELL*2.1, ARIADNE_SPEED=CELL*3.2;

    function triggerAriadne(){
      gameState='ARIADNE'; ariadnePhase='approach'; releaseJoy();
      threadCollected=true; threadPlayerCell={r:-1,c:-1};

      const halfW=W/(2*zoom), halfH=GAME_H/(2*zoom);
      const camX=Math.max(halfW,Math.min(MAZE_W-halfW,player.x));
      const camY=Math.max(halfH,Math.min(MAZE_H-halfH,player.y));

      const cL=Math.floor((camX-halfW)/CELL), cR=Math.ceil((camX+halfW)/CELL);
      const rT=Math.floor((camY-halfH)/CELL), rB=Math.ceil((camY+halfH)/CELL);

      const{r:pr,c:pc}=worldToCell(player.x,player.y);
      const dmap=bfsDist(pr,pc);
      const maxSteps=Math.floor(ARIADNE_SPEED*3/CELL);

      const camScore=({r,c})=>Math.max(0,cL-c,c-cR)+Math.max(0,rT-r,r-rB);
      const candidates=[];
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const d=dmap[idx(r,c)];
        if(d<1||d>maxSteps) continue;
        if(camScore({r,c})>0) candidates.push({r,c,d});
      }

      let spawnR,spawnC;
      if(candidates.length){
        candidates.sort((a,b)=>camScore(a)-camScore(b));
        const minScore=camScore(candidates[0]);
        const pool=candidates.filter(x=>camScore(x)<=minScore+1);
        const pick=pool[Math.floor(Math.random()*pool.length)];
        spawnR=pick.r; spawnC=pick.c;
      } else {
        let best=null,bestD=Infinity;
        for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
          const d=dmap[idx(r,c)];
          if(d>=1&&camScore({r,c})>0&&d<bestD){bestD=d;best={r,c};}
        }
        spawnR=best?best.r:Math.max(0,pr-1); spawnC=best?best.c:pc;
      }

      const cc=cellCenter(spawnR,spawnC);
      ariadne.x=cc.x; ariadne.y=cc.y;
      ariadne.path=bfs(spawnR,spawnC,pr,pc); ariadne.pathTimer=0;
    }

    function updateAriadne(dt){
      const ac=worldToCell(ariadne.x,ariadne.y);
      if(ac.r!==threadPlayerCell.r||ac.c!==threadPlayerCell.c){
        threadPlayerCell=ac;
        threadPath=bfs(ac.r,ac.c,spawnRoom.r0+1,spawnRoom.c0+1);
      }
      if(ariadnePhase==='approach'){
        ariadne.pathTimer-=dt;
        if(ariadne.pathTimer<=0){
          ariadne.pathTimer=0.7;
          const{r,c}=worldToCell(ariadne.x,ariadne.y);
          const{r:pr,c:pc}=worldToCell(player.x,player.y);
          ariadne.path=bfs(r,c,pr,pc);
        }
        if(ariadne.path.length>1){
          const ni=ariadne.path[1],tgt=cellCenter(Math.floor(ni/COLS),ni%COLS);
          const dx=tgt.x-ariadne.x,dy=tgt.y-ariadne.y,d=Math.hypot(dx,dy);
          if(d>1){ariadne.x+=dx/d*ARIADNE_SPEED*dt;ariadne.y+=dy/d*ARIADNE_SPEED*dt;}
          if(d<CELL*0.2) ariadne.path.shift();
          escapeWalkPhase+=dt*2.2;
        }
        resolveWalls(ariadne);
        if(dist(ariadne.x,ariadne.y,player.x,player.y)<CELL*1.5){
          ariadnePhase='escape';
          const{r,c}=worldToCell(player.x,player.y);
          ariadne.path=bfs(r,c,spawnRoom.r0+1,spawnRoom.c0+1);
          ariadne.pathTimer=0; escapeWalkPhase=0;
          ariadneTrail=[{x:ariadne.x,y:ariadne.y}]; playerTrailIdx=0;
        }
      } else if(ariadnePhase==='escape'){
        ariadne.pathTimer-=dt;
        if(ariadne.pathTimer<=0){
          ariadne.pathTimer=0.7;
          const{r,c}=worldToCell(ariadne.x,ariadne.y);
          ariadne.path=bfs(r,c,spawnRoom.r0+1,spawnRoom.c0+1);
        }
        if(ariadne.path.length>1){
          const ni=ariadne.path[1],tgt=cellCenter(Math.floor(ni/COLS),ni%COLS);
          const adx=tgt.x-ariadne.x,ady=tgt.y-ariadne.y,ad=Math.hypot(adx,ady);
          if(ad>1){ariadne.x+=adx/ad*ARIADNE_SPEED*dt;ariadne.y+=ady/ad*ARIADNE_SPEED*dt;}
          if(ad<CELL*0.2) ariadne.path.shift();
        } else {
          const{side:es}=spawnRoom;
          if(es==='top')    ariadne.y-=ARIADNE_SPEED*dt;
          if(es==='bottom') ariadne.y+=ARIADNE_SPEED*dt;
          if(es==='left')   ariadne.x-=ARIADNE_SPEED*dt;
          if(es==='right')  ariadne.x+=ARIADNE_SPEED*dt;
        }
        if(ariadne.x>=0&&ariadne.x<=MAZE_W&&ariadne.y>=0&&ariadne.y<=MAZE_H) resolveWalls(ariadne);
        const lastTp=ariadneTrail[ariadneTrail.length-1];
        if(!lastTp||dist(ariadne.x,ariadne.y,lastTp.x,lastTp.y)>=CELL*0.3)
          ariadneTrail.push({x:ariadne.x,y:ariadne.y});
        if(playerTrailIdx<ariadneTrail.length){
          const twp=ariadneTrail[playerTrailIdx];
          const pdx=twp.x-player.x,pdy=twp.y-player.y,pd=Math.hypot(pdx,pdy);
          if(pd<CELL*0.25) playerTrailIdx++;
          else{
            player.x+=pdx/pd*ARIADNE_SPEED*dt;player.y+=pdy/pd*ARIADNE_SPEED*dt;
            if(player.x>=0&&player.x<=MAZE_W&&player.y>=0&&player.y<=MAZE_H) resolveWalls(player);
          }
        }
        escapeWalkPhase+=dt*2.5;
        const{side}=spawnRoom;
        if(
                (side==='top'    && player.y<-PLAYER_R)||
                (side==='bottom' && player.y>MAZE_H+PLAYER_R)||
                (side==='left'   && player.x<-PLAYER_R)||
                (side==='right'  && player.x>MAZE_W+PLAYER_R)
        ) gameState='WIN';
      }
    }

    function updateIntro(dt) {
      const anim = introAnim;
      anim.elapsed += dt;
      anim.textAlpha = Math.min(1, anim.textAlpha + dt * 1.4);

      // Zoom in tight at start, gradually pull back to normal as player nears entrance
      const introProgress = Math.min(anim.playerPathPos / anim.playerPath.length, 1);
      zoom = 2.5 - 1.5 * introProgress;

      // Advance player at 60% of normal speed so all 4 text phases have breathing room
      anim.playerPathPos += (PLAYER_SPEED / CELL) * 0.6 * dt;
      const pathLen = anim.playerPath.length;
      const pi = Math.min(Math.floor(anim.playerPathPos), pathLen - 1);
      const ni = Math.min(pi + 1, pathLen - 1);
      const frac = anim.playerPathPos - Math.floor(anim.playerPathPos);
      const cA = anim.playerPath[pi], cB = anim.playerPath[ni];
      const posA = cellCenter(Math.floor(cA/COLS), cA%COLS);
      const posB = cellCenter(Math.floor(cB/COLS), cB%COLS);
      player.x = posA.x + (posB.x - posA.x) * frac;
      player.y = posA.y + (posB.y - posA.y) * frac;

      // Mino chases player
      mino.pathTimer -= dt;
      if (mino.pathTimer <= 0) {
        mino.pathTimer = 0.7;
        const {r:mr, c:mc} = worldToCell(mino.x, mino.y);
        const {r:pr, c:pc} = worldToCell(player.x, player.y);
        mino.path = bfs(mr, mc, pr, pc);
      }
      if (mino.path.length > 1) {
        const nci = mino.path[1], tgt = cellCenter(Math.floor(nci/COLS), nci%COLS);
        const dx = tgt.x - mino.x, dy = tgt.y - mino.y, d = Math.hypot(dx, dy);
        if (d > 1) { mino.x += dx/d * MINO_SPEED * dt; mino.y += dy/d * MINO_SPEED * dt; }
        if (d < CELL * 0.5) mino.path.shift();
      }
      resolveWalls(mino);

      // Heartbeat driven by actual distance
      const heartDist = dist(player.x, player.y, mino.x, mino.y);
      const heartT = 1 - Math.min(1, heartDist / (CELL * 14));
      const bps = 0.1 + heartT * 3.4;
      heartPhase += bps * dt;
      if (heartPhase >= 1) heartPhase -= 1;

      // Start fading to black when player is near the end of the path
      if (anim.playerPathPos >= pathLen - 3) {
        anim.fadeAlpha = Math.min(1, (anim.fadeAlpha || 0) + dt * 2.0);
      }
      // Hold on black briefly, then transition to PLAYING and begin fade-in
      if ((anim.fadeAlpha || 0) >= 1) {
        anim.blackHold = (anim.blackHold || 0) + dt;
        if (anim.blackHold >= 0.7) {
          applySpawns();
          zoom = 1;
          gameState = 'PLAYING'; updateLayout();
          introAnim = null;
          screenFadeAlpha = 1;
        }
      }
    }

    function update(dt){
      if(gameState==='ARIADNE'){updateAriadne(dt);return;}
      if (gameState === 'INTRO') { updateIntro(dt); return; }
      if(gameState!=='PLAYING' && gameState!=='TRIVIA') return;

      if(gameState==='PLAYING'){
        let kx = 0;
        let ky = 0;

        if(dragInput.active){
          const dx = dragInput.curX - dragInput.startX;
          const dy = dragInput.curY - dragInput.startY;

          const len = Math.hypot(dx, dy);

          if(len > DRAG_DEADZONE){
            kx = dx / len;
            ky = dy / len;
          }
        }

        const kl = Math.hypot(kx, ky);

        if(kl > 0){
          kx /= kl;
          ky /= kl;

          if(kx < -0.05) player.facing = 'left';
          if(kx >  0.05) player.facing = 'right';
        }

        player.x += kx * PLAYER_SPEED * dt;
        player.y += ky * PLAYER_SPEED * dt;

        resolveWalls(player);
      }
      if(gameState==='PLAYING'){
        let kx = 0;
        let ky = 0;

        if(keys['ArrowLeft'] || keys['a'] || keys['A']) kx -= 1;
        if(keys['ArrowRight'] || keys['d'] || keys['D']) kx += 1;
        if(keys['ArrowUp'] || keys['w'] || keys['W']) ky -= 1;
        if(keys['ArrowDown'] || keys['s'] || keys['S']) ky += 1;

        const kl = Math.hypot(kx, ky);

        if(kl > 0){
          kx /= kl;
          ky /= kl;

          if(kx < -0.05) player.facing = 'left';
          if(kx >  0.05) player.facing = 'right';
        }

        resolveWalls(player);

        for (let i = 0; i < traps.length; i++) {
          const t = traps[i];
          if (!t.cleared && dist(player.x, player.y, t.x, t.y) < CELL * 0.55) {
            // 1. Pick the random index
            const qIdx = Math.floor(Math.random() * TRIVIA_QUESTIONS.length);

            // 2. Get the current active language
            const currentLang = localStorage.getItem('selectedLanguage') || 'en';

            // 3. Fallback to base English, but overwrite with translation if it exists
            let selectedQuestion = { ...TRIVIA_QUESTIONS[qIdx] };

            if (
                    translations[currentLang] &&
                    translations[currentLang].trivia &&
                    translations[currentLang].trivia[qIdx]
            ) {
              selectedQuestion = {
                ...selectedQuestion,
                ...translations[currentLang].trivia[qIdx]
              };
            }

            // 4. Assign the translated question to your state
            triviaState = {
              trapIndex: i,
              question: selectedQuestion,
              selectedIdx: -1,
              answered: false,
              correct: false,
              attempts: 0,
              btnRects: null,
              continueBtnRect: null
            };

            gameState = 'TRIVIA';
            updateLayout();
            releaseJoy();
            return;
          }
        }

        if (gameState !== 'PLAYING') return;

        if(!swordCollected&&dist(player.x,player.y,SWORD_X,SWORD_Y)<CELL*0.7){
          swordCollected=true; player.isTheseus=true; theseusTimer=2.8;
          mino.pathTimer=0;
        }
      }

      if(theseusTimer>0) theseusTimer-=dt;
      if(killFlashTimer>0) killFlashTimer-=dt;
      if(screenFadeAlpha>0) screenFadeAlpha=Math.max(0, screenFadeAlpha-dt*2.0);

      if(triviaState && triviaState.answered && triviaState.resultTimer > 0){
        triviaState.resultTimer -= dt;
        if(triviaState.resultTimer <= 0){
          if(triviaState.correct){
            triviaState = null; gameState = 'PLAYING'; updateLayout();
          } else if(triviaState.attempts < 2){
            triviaState.wrongIdx = triviaState.selectedIdx;
            triviaState.answered = false; triviaState.selectedIdx = -1;
          } else {
            restartGame();
          }
        }
      }

      if(!minoKilled && gameState !== 'TRIVIA'){
        const heartDist = dist(player.x, player.y, mino.x, mino.y);
        const heartT = 1 - Math.min(1, heartDist / (CELL * 14));
        const bps = 0.1 + heartT * 3.4;
        heartPhase += bps * dt;
        if (heartPhase >= 1) heartPhase -= 1;

        mino.pathTimer-=dt;
        if(mino.pathTimer<=0){
          mino.pathTimer=0.7;
          const{r:mr,c:mc}=worldToCell(mino.x,mino.y);
          const{r:pr,c:pc}=worldToCell(player.x,player.y);
          mino.path = player.isTheseus ? bfsRunAway(mr,mc,pr,pc) : bfs(mr,mc,pr,pc);
        }
        if(mino.path.length>1){
          const ni=mino.path[1], tgt=cellCenter(Math.floor(ni/COLS),ni%COLS);
          const dx=tgt.x-mino.x,dy=tgt.y-mino.y,d=Math.hypot(dx,dy);
          if(d>1){mino.x+=dx/d*MINO_SPEED*dt;mino.y+=dy/d*MINO_SPEED*dt;}
          if(d<CELL*0.2) mino.path.shift();
        }
        resolveWalls(mino);

        const contact = dist(player.x,player.y,mino.x,mino.y) < PLAYER_R+MINO_R+2;
        if(contact){
          if(player.isTheseus){
            minoKilled=true; killFlashTimer=3.5;
            const {r:pr,c:pc}=worldToCell(player.x,player.y);
            const dmap=bfsDist(pr,pc);
            const nearby=[];
            for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
              const d=dmap[idx(r,c)]; if(d>=4&&d<=5) nearby.push({r,c});
            }
            const pick=nearby.length ? nearby[Math.floor(Math.random()*nearby.length)] : {r:pr,c:pc};
            const tc=cellCenter(pick.r,pick.c); threadItemX=tc.x; threadItemY=tc.y;
            if(gameState==='TRIVIA'){ triviaState=null; gameState='PLAYING'; updateLayout();}
          } else { gameState='DEAD'; triviaState=null;     window.location.href = 'game-over.html';
            return; }
        }
      }

      if(minoKilled){
        const {side}=spawnRoom;
        if(side==='top'    && player.y<-PLAYER_R)       { gameState='WIN'; window.location.href = "victory.html"; }
        if(side==='bottom' && player.y>MAZE_H+PLAYER_R) { gameState='WIN'; window.location.href = "victory.html"; }
        if(side==='left'   && player.x<-PLAYER_R)       { gameState='WIN'; window.location.href = "victory.html"; }
        if(side==='right'  && player.x>MAZE_W+PLAYER_R) { gameState='WIN'; window.location.href = "victory.html"; }

        if(!threadCollected && dist(player.x,player.y,threadItemX,threadItemY)<CELL*0.7){
          threadCollected=true;
        }

        if(threadCollected){
          const pc = worldToCell(player.x, player.y);
          if (pc.r !== threadPlayerCell.r || pc.c !== threadPlayerCell.c) {
            threadPlayerCell = pc;
            threadPath = bfs(pc.r, pc.c, spawnRoom.r0+1, spawnRoom.c0+1);
          }
        }
      }

      if (player.isTheseus && !minoKilled) {
        const _halfW = W / (2 * zoom), _halfH = GAME_H / (2 * zoom);
        const camX = Math.max(_halfW, Math.min(MAZE_W - _halfW, player.x));
        const camY = Math.max(_halfH, Math.min(MAZE_H - _halfH, player.y));
        const mmWidth  = Math.floor(MAZE_W / 6 * 1.32);
        const mmHeight = Math.floor(MAZE_H / 6 * 1.32);
        const mmX = 8, mmY = GAME_H - mmHeight - 8;
        const psx = (player.x - camX) * zoom + W / 2;
        const psy = (player.y - camY) * zoom + GAME_H / 2;
        const msx = (mino.x - camX) * zoom + W / 2;
        const msy = (mino.y - camY) * zoom + GAME_H / 2;
        const playerOverlaps = psx >= mmX - 20 && psx <= mmX + mmWidth && psy >= mmY && psy <= mmY + mmHeight;
        const minoOverlaps   = msx >= mmX && msx <= mmX + mmWidth && msy >= mmY && msy <= mmY + mmHeight;
        const overlaps = playerOverlaps || minoOverlaps || (player.x < 400 && player.y > 550);
        const target = overlaps ? 0 : 0.9;
        const speed = 0.6 / 0.2;
        minimapAlpha = overlaps
                ? Math.max(target, minimapAlpha - speed * dt)
                : Math.min(target, minimapAlpha + speed * dt);
      }
    }

    function getIntroSkipButton() {
      const btnW = W * 0.28;
      const btnH = Math.floor(CTRL_H * 0.30);
      const x = W - btnW - 16;
      const y = GAME_H - btnH - 16;
      return { x, y, w: btnW, h: btnH };
    }

    function drawIntroOverlay() {
      if (!introAnim) return;
      const a = introAnim.textAlpha;
      const progress = introAnim.playerPathPos / introAnim.playerPath.length;
      ctx.textAlign = 'center';

      // Title banner at top
      const ty = QUEUE_H + Math.floor(GAME_H * 0.075);
      ctx.fillStyle = `rgba(10, 20, 38, ${a * 0.78})`;
      ctx.beginPath();
      ctx.roundRect(W * 0.05, ty - 34, W * 0.90, 52, 10);
      ctx.fill();

      ctx.fillStyle = `rgba(213, 230, 237, ${a})`;
      ctx.font = `bold ${Math.floor(W * 0.055)}px IM Fell Double Pica,serif`;
      ctx.fillText('— CUTSCENE —', W / 2, ty);

      const skipBtn = getIntroSkipButton();

      ctx.fillStyle = `rgba(252, 176, 117, ${a})`;
      ctx.beginPath();
      ctx.roundRect(
              skipBtn.x,
              skipBtn.y,
              skipBtn.w,
              skipBtn.h,
              10
      );
      ctx.fill();

      ctx.fillStyle = `rgba(28, 53, 94, ${a})`;
      ctx.font = `bold ${Math.floor(W * 0.055)}px IM Fell Double Pica,serif`;
      ctx.fillText(
              'SKIP',
              skipBtn.x + skipBtn.w / 2,
              skipBtn.y + skipBtn.h / 2 + Math.floor(W * 0.055 * 0.35)
      );

      // Phase-based instruction near bottom
      const elapsed = introAnim.elapsed;
      let line, color;
      const currentLang = localStorage.getItem('selectedLanguage') || 'en';
      const langMap = translations[currentLang] || translations['en'];
      if (elapsed < 3.5) {
        line  = langMap["hunt_line_1"] || 'The Minotaur hunts you through the maze...';
        color = `rgba(204, 34, 0, ${a})`;
      } else if (elapsed < 7.0) {
        line  = langMap["hunt_line_2"] || 'Your heartbeat reveals how close it is!';
        color = `rgba(252, 176, 117, ${a})`;
      } else {
        line = langMap["hunt_line_3"] || 'The farther you run, the calmer your heart...';
        color = `rgba(204, 34, 0, ${a})`;
      }

      const fontSize = Math.floor(W * 0.090);
      const lineH = Math.floor(fontSize * 1.35);
      const maxW = W * 0.90;

      ctx.fillStyle = color;
      ctx.font = `bold ${fontSize}px IM Fell Double Pica,serif`;

      const words = line.split(' ');
      const lines = [];
      let cur = '';

      for (const w of words) {
        const test = cur ? cur + ' ' + w : w;

        if (ctx.measureText(test).width > maxW && cur) {
          lines.push(cur);
          cur = w;
        } else {
          cur = test;
        }
      }

      if (cur) lines.push(cur);

      const blockH = lines.length * lineH;
      const areaTop = GAME_H;
      const areaH = CTRL_H;

      let textY = areaTop + (areaH - blockH) / 2 + lineH * 0.8;

      for (const l of lines) {
        ctx.fillText(l, W / 2, textY);
        textY += lineH;
      }
    }

    function drawTrap(x, y) {
      const r = CELL * 0.28;
      ctx.save();
      ctx.shadowColor = 'rgba(180, 0, 0, 0.7)';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(x, y - r); ctx.lineTo(x + r, y);
      ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
      ctx.closePath();
      ctx.fillStyle = '#1a0505';
      ctx.fill();
      ctx.strokeStyle = '#8B0000';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#cc2200';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      const s = r * 0.45;
      ctx.beginPath();
      ctx.moveTo(x - s, y - s); ctx.lineTo(x + s, y + s);
      ctx.moveTo(x + s, y - s); ctx.lineTo(x - s, y + s);
      ctx.stroke();
      ctx.restore();
    }

    function wrapText(text, maxW, lineH, startY) {
      const words = text.split(' ');
      let line = '', y = startY;
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, W / 2, y);
          y += lineH; line = word;
        } else { line = test; }
      }
      if (line) { ctx.fillText(line, W / 2, y); y += lineH; }
      return y;
    }

    function drawTriviaOverlay() {
      if (!triviaState) return;

      const { question, selectedIdx, answered } = triviaState;

      const pad = W * 0.04; // was 0.06
      const maxW = W - pad * 2;

      ctx.fillStyle = 'rgba(10, 20, 38, 0.38)';
      ctx.fillRect(0, QUEUE_H, W, GAME_H - QUEUE_H);

      ctx.textAlign = 'center';

      let y = QUEUE_H + Math.floor(GAME_H * 0.035);

      // TRAP HEADER
      ctx.fillStyle = '#cc2200';
      ctx.font = `bold ${Math.floor(W * 0.09)}px IM Fell Double Pica,serif`;
      ctx.fillText('⚠  TRAP!', W / 2, y + 26);

      y += 68;

      // SUBTITLE
      ctx.fillStyle = '#D5E6ED';
      ctx.font = `${Math.floor(W * 0.052)}px IM Fell Double Pica,serif`;

      if (!(answered && triviaState.correct)) {
        const attemptsLeft = 2 - triviaState.attempts;

        ctx.fillText(
                attemptsLeft === 2
                        ? 'Answer correctly to escape!'
                        : '⚠ Last chance — wrong answer restarts the game!',
                W / 2,
                y
        );
      }

      y += Math.floor(GAME_H * 0.04);

      // QUESTION
      const hasImg = !!question.img;

      ctx.fillStyle = '#FCB075';
      ctx.font = `bold ${Math.floor(
              W * (hasImg ? 0.058 : 0.064)
      )}px IM Fell Double Pica,serif`;

      y = wrapText(
              question.q,
              maxW,
              Math.floor(W * (hasImg ? 0.068 : 0.074)),
              y
      );

      y += Math.floor(GAME_H * 0.02);

      // IMAGE
      if (hasImg) {
        const entry = getTriviaImg(question.img);

        const imgH = Math.floor(GAME_H * 0.15); // was 0.22
        const imgW = maxW;

        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.roundRect(pad, y, imgW, imgH, 10);
        ctx.fill();

        const imgReady =
                entry.loaded ||
                (!entry.error &&
                        entry.img.complete &&
                        entry.img.naturalWidth > 0);

        if (imgReady) {
          const scale = Math.min(
                  imgW / entry.img.naturalWidth,
                  imgH / entry.img.naturalHeight
          ) * 0.5;

          const dw = entry.img.naturalWidth * scale;
          const dh = entry.img.naturalHeight * scale;

          ctx.drawImage(
                  entry.img,
                  pad + (imgW - dw) / 2,
                  y + (imgH - dh) / 2,
                  dw,
                  dh
          );
        } else {
          ctx.fillStyle = 'rgba(213,230,237,0.4)';
          ctx.font = `${Math.floor(W * 0.045)}px IM Fell Double Pica,serif`;

          ctx.fillText(
                  entry.error
                          ? `[ failed: ${question.img} ]`
                          : `[ loading: ${question.img} ]`,
                  W / 2,
                  y + imgH / 2
          );
        }

        y += imgH + Math.floor(GAME_H * 0.018);
      }

      // ANSWERS
      const btnH = Math.floor(
              GAME_H * (hasImg ? 0.125 : 0.14)
      );

      const btnGap = Math.floor(GAME_H * 0.018);

      triviaState.btnRects = [];

      for (let i = 0; i < 4; i++) {
        const bx = pad;
        const by = y;

        triviaState.btnRects.push({
          x: bx,
          y: by,
          w: maxW,
          h: btnH
        });

        let bg = 'rgba(28, 53, 94, 0.78)';
        let border = '#556B85';
        let tc = '#D5E6ED';

        if (answered) {
          if (triviaState.correct && i === question.a) {
            bg = 'rgba(20, 110, 55, 0.82)';
            border = '#4CAF50';
            tc = '#fff';
          } else if (i === selectedIdx && i !== question.a) {
            bg = 'rgba(150, 28, 28, 0.82)';
            border = '#cc2200';
            tc = '#fff';
          }
        } else if (i === selectedIdx) {
          bg = 'rgba(55, 88, 140, 0.85)';
          border = '#FCB075';
        } else if (i === triviaState.wrongIdx) {
          bg = 'rgba(150, 28, 28, 0.82)';
          border = '#cc2200';
          tc = '#fff';
        }

        ctx.fillStyle = bg;
        ctx.beginPath();
        ctx.roundRect(bx, by, maxW, btnH, 12);
        ctx.fill();

        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(bx, by, maxW, btnH, 12);
        ctx.stroke();

        ctx.fillStyle = tc;
        ctx.font = `${Math.floor(W * 0.055)}px IM Fell Double Pica,serif`;

        ctx.fillText(
                question.opts[i],
                W / 2,
                by + btnH * 0.66
        );

        y += btnH + btnGap;
      }

      // RESTART BUTTON
      if (
              answered &&
              !triviaState.correct &&
              triviaState.attempts >= 2
      ) {
        y += 6;

        const cbtnH = Math.floor(GAME_H * 0.13);

        ctx.fillStyle = 'rgba(100, 35, 35, 0.82)';
        ctx.beginPath();
        ctx.roundRect(pad, y, maxW, cbtnH, 12);
        ctx.fill();

        ctx.strokeStyle = '#cc2200';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(pad, y, maxW, cbtnH, 12);
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.floor(W * 0.06)}px IM Fell Double Pica,serif`;

        ctx.fillText(
                '✗ Restarting...',
                W / 2,
                y + cbtnH * 0.66
        );
      }
    }

    function handleTriviaClick(x, y) {
      if (!triviaState || triviaState.answered) return;
      const rects = triviaState.btnRects;
      if (!rects) return;
      for (let i = 0; i < 4; i++) {
        const b = rects[i];
        if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
          triviaState.attempts++;
          triviaState.selectedIdx = i;
          triviaState.answered = true;
          triviaState.correct = (i === triviaState.question.a);
          if (triviaState.correct) {
            traps[triviaState.trapIndex].cleared = true;
            triviaState.resultTimer = 0.75;
          } else if (triviaState.attempts < 2) {
            triviaState.resultTimer = 0.65;
          } else {
            triviaState.resultTimer = 1.2;
          }
          return;
        }
      }
    }

    function drawStickFigure(x,y,s,color,walkPhase=0){
      const sw=Math.sin(walkPhase*Math.PI*2)*0.42*s;
      ctx.strokeStyle=color;ctx.lineWidth=Math.max(1.5,s*0.11);ctx.lineCap='round';
      ctx.beginPath();ctx.arc(x,y-s*1.85,s*0.52,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y-s*1.33);ctx.lineTo(x,y+s*0.55);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-s*0.72,y-s*0.58);ctx.lineTo(x+s*0.72,y-s*0.58);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+s*0.55);ctx.lineTo(x-s*0.52+sw,y+s*1.5);ctx.moveTo(x,y+s*0.55);ctx.lineTo(x+s*0.52-sw,y+s*1.5);ctx.stroke();
    }
    function drawAriadne(x,y,s,walkPhase){
      const hx=x, hy=y-s*1.85;
      ctx.save();
      ctx.strokeStyle='#6B3A2A'; ctx.lineWidth=Math.max(2,s*0.14); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(hx-s*0.35,hy-s*0.35);
      ctx.bezierCurveTo(hx-s*0.85,hy+s*0.2,hx-s*0.95,hy+s*0.9,hx-s*0.65,hy+s*1.55); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hx-s*0.1,hy-s*0.5);
      ctx.bezierCurveTo(hx-s*0.3,hy+s*0.4,hx-s*0.5,hy+s*1.0,hx-s*0.4,hy+s*1.65); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hx+s*0.35,hy-s*0.35);
      ctx.bezierCurveTo(hx+s*0.75,hy+s*0.1,hx+s*0.7,hy+s*0.8,hx+s*0.5,hy+s*1.5); ctx.stroke();
      ctx.restore();
      drawStickFigure(x,y,s,'#FCB075',walkPhase);
    }
    function drawSwordOnFigure(x,y,s){
      const sw=s*0.5,ox=x+s*0.88,oy=y-s*0.45;
      ctx.strokeStyle='#fca259';ctx.lineWidth=Math.max(1.5,sw*0.12);ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(ox,oy-sw*1.5);ctx.lineTo(ox,oy+sw*0.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox-sw*0.5,oy-sw*0.15);ctx.lineTo(ox+sw*0.5,oy-sw*0.15);ctx.stroke();
    }
    function drawMinotaur(x,y,s){
      const size = s * 4.5;
      if(minotaurImgLoaded){
        const offscreen = document.createElement('canvas');
        offscreen.width = size; offscreen.height = size;
        const octx = offscreen.getContext('2d');
        octx.drawImage(minotaurImg, 0, 0, size, size);

        // Don't tint Stephen red
        if (!isStephen) {
          octx.globalCompositeOperation = 'source-atop';
          octx.fillStyle = 'rgba(180,0,0,0.9)';
          octx.fillRect(0, 0, size, size);
        }

        ctx.drawImage(offscreen, x - size/2, y + s*1.5 - size);
      } else {
        ctx.strokeStyle='#c44';ctx.lineWidth=Math.max(1.5,s*0.13);ctx.lineCap='round';
        ctx.beginPath();ctx.rect(x-s*0.62,y-s*1.1,s*1.24,s*1.35);ctx.stroke();
        ctx.beginPath();ctx.arc(x,y-s*1.62,s*0.52,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x-s*0.42,y-s*2.06);ctx.lineTo(x-s*0.82,y-s*2.68);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+s*0.42,y-s*2.06);ctx.lineTo(x+s*0.82,y-s*2.68);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x-s*0.32,y+s*0.25);ctx.lineTo(x-s*0.32,y+s*1.3);ctx.moveTo(x+s*0.32,y+s*0.25);ctx.lineTo(x+s*0.32,y+s*1.3);ctx.stroke();
      }
    }
    function drawOrnateGate(x, y, w, h, orient, isClosed) {
      const gradient = ctx.createLinearGradient(x, y, x + (orient==='horizontal' ? w : 0), y + (orient==='vertical' ? h : 0));
      gradient.addColorStop(0, '#4A2511');
      gradient.addColorStop(0.5, '#6B3E23');
      gradient.addColorStop(1, '#3D1F0F');
      ctx.fillStyle = gradient;
      const postW = w * 0.15, postH = h * 0.15;
      if (isClosed) {
        if (orient === 'horizontal') {
          ctx.fillRect(x, y, w, h);
          ctx.strokeStyle = '#8B5A2B';
          ctx.lineWidth = 1.5;
          for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(x + (w / 6) * i, y);
            ctx.lineTo(x + (w / 6) * i, y + h);
            ctx.stroke();
          }
          ctx.fillStyle = '#D4AF37';
          for (let i = 0; i < 5; i++) {
            const ox = x + (w / 5) * (i + 0.5);
            ctx.beginPath();
            ctx.arc(ox, y + h / 2, h * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#A68A39';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
          ctx.fillRect(x, y + h * 0.7, w, h * 0.3);
        } else {
          ctx.fillRect(x, y, w, h);
          ctx.strokeStyle = '#8B5A2B';
          ctx.lineWidth = 1.5;
          for (let i = 0; i < 6; i++) {
            ctx.beginPath();
            ctx.moveTo(x, y + (h / 6) * i);
            ctx.lineTo(x + w, y + (h / 6) * i);
            ctx.stroke();
          }
          ctx.fillStyle = '#D4AF37';
          for (let i = 0; i < 5; i++) {
            const oy = y + (h / 5) * (i + 0.5);
            ctx.beginPath();
            ctx.arc(x + w / 2, oy, w * 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#A68A39';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
          ctx.fillRect(x + w * 0.7, y, w * 0.3, h);
        }
      } else {
        if (orient === 'horizontal') {
          const post1X = x, post2X = x + w - postW;
          ctx.fillRect(post1X, y, postW, h);
          ctx.fillRect(post2X, y, postW, h);
          ctx.strokeStyle = '#8B5A2B';
          ctx.lineWidth = 1;
          for (let p of [post1X, post2X]) {
            for (let i = 0; i < 3; i++) {
              ctx.beginPath();
              ctx.moveTo(p, y + (h / 3) * (i + 1));
              ctx.lineTo(p + postW, y + (h / 3) * (i + 1));
              ctx.stroke();
            }
          }
          ctx.fillStyle = '#D4AF37';
          ctx.beginPath();
          ctx.moveTo(post1X - postW * 0.3, y - postW * 0.2);
          ctx.lineTo(post1X + postW * 1.3, y - postW * 0.2);
          ctx.lineTo(post1X + postW * 0.9, y);
          ctx.lineTo(post1X + postW * 0.1, y);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(post2X - postW * 0.3, y - postW * 0.2);
          ctx.lineTo(post2X + postW * 1.3, y - postW * 0.2);
          ctx.lineTo(post2X + postW * 0.9, y);
          ctx.lineTo(post2X + postW * 0.1, y);
          ctx.fill();
          ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
          ctx.shadowBlur = 8;
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + w * 0.15, y + h * 0.3);
          ctx.lineTo(x + w * 0.85, y + h * 0.3);
          ctx.stroke();
        } else {
          const post1Y = y, post2Y = y + h - postH;
          ctx.fillRect(x, post1Y, w, postH);
          ctx.fillRect(x, post2Y, w, postH);
          ctx.strokeStyle = '#8B5A2B';
          ctx.lineWidth = 1;
          for (let p of [post1Y, post2Y]) {
            for (let i = 0; i < 3; i++) {
              ctx.beginPath();
              ctx.moveTo(x + (w / 3) * (i + 1), p);
              ctx.lineTo(x + (w / 3) * (i + 1), p + postH);
              ctx.stroke();
            }
          }
          ctx.fillStyle = '#D4AF37';
          ctx.beginPath();
          ctx.moveTo(x - postH * 0.2, post1Y - postH * 0.3);
          ctx.lineTo(x - postH * 0.2, post1Y + postH * 1.3);
          ctx.lineTo(x, post1Y + postH * 0.9);
          ctx.lineTo(x, post1Y + postH * 0.1);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(x - postH * 0.2, post2Y - postH * 0.3);
          ctx.lineTo(x - postH * 0.2, post2Y + postH * 1.3);
          ctx.lineTo(x, post2Y + postH * 0.9);
          ctx.lineTo(x, post2Y + postH * 0.1);
          ctx.fill();
          ctx.shadowColor = 'rgba(212, 175, 55, 0.6)';
          ctx.shadowBlur = 8;
          ctx.strokeStyle = '#FFD700';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + w * 0.3, y + h * 0.15);
          ctx.lineTo(x + w * 0.3, y + h * 0.85);
          ctx.stroke();
        }
      }
      ctx.shadowColor = 'transparent';
    }

    function drawMinimap() {
      const mmWidth  = Math.floor(MAZE_W / 6 * 1.32);
      const mmHeight = Math.floor(MAZE_H / 6 * 1.32);
      const mmX = 8;
      const mmY = GAME_H - mmHeight - 8;
      const scale = mmWidth / MAZE_W;

      ctx.save();
      ctx.globalAlpha = minimapAlpha;

      ctx.fillStyle = '#14253D';
      ctx.fillRect(mmX, mmY, mmWidth, mmHeight);

      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 0.5;
      ctx.lineCap = 'square';
      ctx.beginPath();
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const x = mmX + c * CELL * scale;
          const y = mmY + r * CELL * scale;
          const cs = CELL * scale;
          const cell = maze[idx(r, c)];
          if (!(cell & 1)) { ctx.moveTo(x, y);      ctx.lineTo(x+cs, y);    }
          if (!(cell & 2)) { ctx.moveTo(x+cs, y);   ctx.lineTo(x+cs, y+cs); }
          if (!(cell & 4)) { ctx.moveTo(x, y+cs);   ctx.lineTo(x+cs, y+cs); }
          if (!(cell & 8)) { ctx.moveTo(x, y);      ctx.lineTo(x, y+cs);    }
        }
      }
      ctx.stroke();

      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 1;
      ctx.strokeRect(mmX, mmY, mmWidth, mmHeight);

      const sqSize = Math.max(2, Math.floor(CELL * scale * 0.6));
      const msx = mmX + mino.x * scale - sqSize / 2;
      const msy = mmY + mino.y * scale - sqSize / 2;
      ctx.fillStyle = '#cc4444';
      ctx.fillRect(msx, msy, sqSize, sqSize);

      const psx = mmX + player.x * scale - sqSize / 2;
      const psy = mmY + player.y * scale - sqSize / 2;
      ctx.fillStyle = '#FFE600';
      ctx.fillRect(psx, psy, sqSize, sqSize);

      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeRect(mmX, mmY, mmWidth, mmHeight);

      ctx.restore();
    }

    function drawMaze(camX,camY){
      const r0=Math.max(0,Math.floor((camY-GAME_H/2)/CELL)-1);
      const r1=Math.min(ROWS-1,Math.ceil((camY+GAME_H/2)/CELL)+1);
      const c0=Math.max(0,Math.floor((camX-W/2)/CELL)-1);
      const c1=Math.min(COLS-1,Math.ceil((camX+W/2)/CELL)+1);
      ctx.strokeStyle='#556B85';ctx.lineWidth=2;ctx.lineCap='square';
      ctx.beginPath();
      for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
        const x=c*CELL,y=r*CELL,cell=maze[idx(r,c)];
        if(!(cell&1)){ctx.moveTo(x,y);ctx.lineTo(x+CELL,y);}
        if(!(cell&2)){ctx.moveTo(x+CELL,y);ctx.lineTo(x+CELL,y+CELL);}
        if(!(cell&4)){ctx.moveTo(x,y+CELL);ctx.lineTo(x+CELL,y+CELL);}
        if(!(cell&8)){ctx.moveTo(x,y);ctx.lineTo(x,y+CELL);}
      }
      ctx.stroke();
      ctx.strokeStyle='#1C355E';ctx.lineWidth=3;ctx.strokeRect(0,0,MAZE_W,MAZE_H);
    }

    function drawVirtualJoystick(){
      if(!dragInput.active) return;

      const dx = dragInput.curX - dragInput.startX;
      const dy = dragInput.curY - dragInput.startY;
      const dist = Math.hypot(dx, dy);
      const clamped = Math.min(dist, JOY_RADIUS);
      const angle = Math.atan2(dy, dx);
      const knobX = dist > 0 ? dragInput.startX + Math.cos(angle) * clamped : dragInput.startX;
      const knobY = dist > 0 ? dragInput.startY + Math.sin(angle) * clamped : dragInput.startY;

      ctx.save();
      ctx.fillStyle = 'rgba(213,230,237,0.18)';
      ctx.strokeStyle = 'rgba(213,230,237,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(dragInput.startX, dragInput.startY, JOY_RADIUS, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(252,176,117,0.85)';
      ctx.beginPath();
      ctx.arc(knobX, knobY, JOY_RADIUS*0.45, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawFloatingShareButton() {
      const btnSize = Math.floor(CELL * 1.45);

      // iOS-style share icon: upward arrow from a box
      ctx.strokeStyle = '#FCB075';

      ctx.lineJoin = 'round';

      const cx = btnX + btnSize / 2;

      ctx.beginPath();
      ctx.moveTo(cx, cy + s * 0.7);

      // Arrow head
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.6, cy - s * 0.3);
      ctx.lineTo(cx, cy - s * 1.1);
      ctx.lineTo(cx + s * 0.6, cy - s * 0.3);

      ctx.moveTo(cx - s * 0.8, cy + s * 0.1);
      ctx.lineTo(cx - s * 0.8, cy + s * 1.3);
      ctx.lineTo(cx + s * 0.8, cy + s * 1.3);

    function render(){
      const halfW = W / (2 * zoom), halfH = GAME_H / (2 * zoom);
      const camX = Math.max(halfW, Math.min(MAZE_W - halfW, player.x));
      // During intro use strict halfH clamp so the camera never shows outside the maze
      const camYMin = gameState === 'INTRO' ? halfH : (GAME_H/2 - QUEUE_H) / zoom;
      const camY = Math.max(camYMin, Math.min(MAZE_H - halfH, player.y));

      ctx.fillStyle='#14253D';ctx.fillRect(0,0,W,GAME_H);

      ctx.save();
      ctx.beginPath();ctx.rect(0,0,W,GAME_H);ctx.clip();
      ctx.translate(W/2, GAME_H/2);
      ctx.scale(zoom, zoom);
      ctx.translate(-camX, -camY);

      drawMaze(camX,camY);

      {
        const pathSet = introAnim ? new Set(introAnim.playerPath) : null;
        for (const t of traps) {
          if (t.cleared) continue;
          if (pathSet) {
            const {r, c} = worldToCell(t.x, t.y);
            if (pathSet.has(idx(r, c))) continue;
          }
          drawTrap(t.x, t.y);
        }
      }

      {
        const {side:ds,r0:dr,c0:dc}=spawnRoom;
        const dx=dc*CELL, dy=dr*CELL;
        const off=CELL*0.18;
        const doorOpen=minoKilled||ariadnePhase==='escape';
        if(ds==='top')         drawOrnateGate(dx, -off, 2*CELL, CELL*0.3, 'horizontal', !doorOpen);
        else if(ds==='bottom') drawOrnateGate(dx, MAZE_H+off-CELL*0.3, 2*CELL, CELL*0.3, 'horizontal', !doorOpen);
        else if(ds==='left')   drawOrnateGate(-off, dy, CELL*0.3, 2*CELL, 'vertical', !doorOpen);
        else                   drawOrnateGate(MAZE_W+off-CELL*0.3, dy, CELL*0.3, 2*CELL, 'vertical', !doorOpen);
      }

      if(!swordCollected) drawSwordItem(SWORD_X,SWORD_Y,CELL*0.30);
      if(minoKilled && !threadCollected) drawThreadItem(threadItemX, threadItemY);
      if(!ariadnePhase){
        if(minoKilled){
          ctx.strokeStyle='rgba(150,50,50,0.55)';ctx.lineWidth=3;ctx.lineCap='round';
          ctx.beginPath();
          ctx.moveTo(mino.x-CELL*0.28,mino.y-CELL*0.28);ctx.lineTo(mino.x+CELL*0.28,mino.y+CELL*0.28);
          ctx.moveTo(mino.x+CELL*0.28,mino.y-CELL*0.28);ctx.lineTo(mino.x-CELL*0.28,mino.y+CELL*0.28);
          ctx.stroke();
        } else {
          drawMinotaur(mino.x,mino.y,CELL*0.38);
        }
      }
      if(!minoKilled){
        const hAlpha = 0.7 * (1 - heartPhase);
        const s = PLAYER_R * (1 + heartPhase * 4);
        const hx = player.x, hy = player.y;
        ctx.beginPath();
        ctx.moveTo(hx, hy + s);
        ctx.bezierCurveTo(hx - s*1.4, hy + s*0.3, hx - s*1.4, hy - s*0.7, hx, hy - s*0.15);
        ctx.bezierCurveTo(hx + s*1.4, hy - s*0.7, hx + s*1.4, hy + s*0.3, hx, hy + s);
        ctx.strokeStyle = `rgba(220, 50, 50, ${hAlpha})`;
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      if (((minoKilled && threadCollected) || ariadnePhase) && threadPath.length > 1) {
        const {side: ts, r0: tr, c0: tc} = spawnRoom;
        let exitX, exitY;
        if (ts === 'top')    { exitX = (tc + 1) * CELL; exitY = -CELL; }
        if (ts === 'bottom') { exitX = (tc + 1) * CELL; exitY = MAZE_H + CELL; }
        if (ts === 'left')   { exitX = -CELL;           exitY = (tr + 1) * CELL; }
        if (ts === 'right')  { exitX = MAZE_W + CELL;   exitY = (tr + 1) * CELL; }
        ctx.save();
        ctx.shadowColor = 'rgba(247, 224, 15, 0.8)';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = 'rgb(247, 224, 15)';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(ariadnePhase ? ariadne.x : player.x, ariadnePhase ? ariadne.y : player.y);
        for (let i = 1; i < threadPath.length; i++) {
          const ci = threadPath[i];
          const {x, y} = cellCenter(Math.floor(ci / COLS), ci % COLS);
          ctx.lineTo(x, y);
        }
        ctx.lineTo(exitX, exitY);
        ctx.stroke();
        ctx.restore();
      }
      if(ariadnePhase) drawAriadne(ariadne.x,ariadne.y,CELL*0.38,escapeWalkPhase);
      drawTheseusFigure(
              player.x,
              player.y,
              CELL*0.38,
              player.facing || 'right',
              player.isTheseus,
              ariadnePhase === 'escape'
                      ? escapeWalkPhase
                      : 0
      );

      ctx.restore();

      if(theseusTimer>0){
        const a=Math.min(1,theseusTimer);
        const bx=W*0.04,by=GAME_H*0.34,bw=W*0.92,bh=GAME_H*0.24;
        ctx.fillStyle=`rgba(28, 53, 94, ${a*0.85})`;
        ctx.fillRect(bx,by,bw,bh);

        ctx.fillStyle=`rgba(252, 176, 117, ${a})`;
        ctx.textAlign='center';

        ctx.font=`bold ${Math.floor(W*0.072)}px IM Fell Double Pica,serif`;
        ctx.fillText('You have now become',W/2,by+bh*0.42);
        ctx.fillText('Theseus!',W/2,by+bh*0.78);
      }

      if(killFlashTimer>0){
        const a=Math.min(1,killFlashTimer);
        const bx=W*0.04,by=GAME_H*0.32,bw=W*0.92,bh=GAME_H*0.28;

        ctx.fillStyle=`rgba(28, 53, 94, ${a*0.88})`;
        ctx.fillRect(bx,by,bw,bh);

        ctx.fillStyle=`rgba(220, 50, 50, ${a})`;
        ctx.textAlign='center';
        ctx.font=`bold ${Math.floor(W*0.060)}px IM Fell Double Pica,serif`;
        ctx.fillText('You killed the Minotaur.',W/2,by+bh*0.38);

        ctx.fillStyle=`rgba(213, 230, 237, ${a})`;
        ctx.font=`${Math.floor(W*0.054)}px IM Fell Double Pica,serif`;
        ctx.fillText('Now exit the maze!',W/2,by+bh*0.74);
      }

      if(ariadnePhase==='approach'){
        const bx=W*0.04,by=GAME_H*0.24,bw=W*0.92,bh=GAME_H*0.30;

        ctx.fillStyle='rgba(28, 53, 94, 0.88)';
        ctx.fillRect(bx,by,bw,bh);

        ctx.fillStyle='#FCB075';
        ctx.textAlign='center';

        ctx.font=`bold ${Math.floor(W*0.056)}px IM Fell Double Pica,serif`;
        ctx.fillText("You're now at the front of the line!",W/2,by+bh*0.38);

        ctx.font=`${Math.floor(W*0.050)}px IM Fell Double Pica,serif`;
        ctx.fillText('Ariadne has come to save you!',W/2,by+bh*0.74);
      }

      if (CTRL_H > 0) {
        ctx.fillStyle='#D5E6ED';
        ctx.fillRect(0,GAME_H,W,CTRL_H);
      }

      if(gameState==='TRIVIA') drawTriviaOverlay();
      if(gameState==='INTRO') drawIntroOverlay();

      // Black overlay for intro fade-out and gameplay fade-in
      const introFade = introAnim ? (introAnim.fadeAlpha || 0) : 0;
      const totalFade = Math.max(introFade, screenFadeAlpha);
      if (totalFade > 0) {
        ctx.fillStyle = `rgba(0,0,0,${totalFade})`;
        ctx.fillRect(0, 0, W, H);
      }

      drawQueueBar();

      if (gameState === 'PLAYING') {
        if (player.isTheseus && !minoKilled) drawMinimap();
        drawFloatingPauseButton();
        drawFloatingShareButton();
        drawFloatingQuitButton();
        drawVirtualJoystick();
      }
    }

    function loop(ts){
      const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
      if(gameState==='PLAYING' && queuePos>0){
        queueTimer-=dt;
        if(queueTimer<=0){ queuePos--; queueTimer=15+Math.random()*25; if(queuePos===1)triggerAriadne(); }
      }
      update(dt); render(); console.log(player.x.toFixed(1), player.y.toFixed(1)); requestAnimationFrame(loop);
    }
    requestAnimationFrame(ts=>{lastTime=ts;requestAnimationFrame(loop);});
  </script>
</div>
</body>
</html>

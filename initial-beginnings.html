<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initial Beginnings - Rules & Play</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Initial Beginnings Base Canvas Container */
        .initial-beginnings-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 (Blurred Background Circle) */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2);
            top: -178px;
            bottom: 510px;
            background: #D9D9D9;
            filter: blur(150px);
            pointer-events: none;
        }

        /* Rectangle 5 (Inner Card Panel) */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;
        }

        /* Vector */
        .logo-vector {
            position: absolute;
            width: 201.16px;
            height: 54.35px;
            left: 50%;
            transform: translateX(-50%);
            top: 49.28px;
        }

        /* Unified Back Button Assembly (Rectangle 7 + Rectangle 8 + Left Arrow Text) */
        .back-nav-button {
            box-sizing: border-box;
            position: absolute;
            width: 32px;
            height: 34px;
            left: calc(50% - 32px/2 - 100.5px);
            top: 101px;
            
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 5px;
            
            font-family: 'IM Fell Double Pica', serif;
            font-size: 16px;
            color: #14325C;
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
        }

        .back-nav-button:hover {
            opacity: 0.8;
        }

        /* =========================================================
           STORY TUTORIAL STEPS & CORRESPONDING GRAPHIC LAYERS
           ========================================================= */
        
        /* STEP 1. FIND SWORD Text Frame */
        .step-one-text {
            position: absolute;
            width: 188px;
            height: 31px;
            left: calc(50% - 188px/2 + 0.5px);
            top: 122px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 13px;
            line-height: 16px;
            text-align: right;
            color: #14325C;
        }

        /* New Project(1) 1 Image Asset Frame */
        .graphic-step-one {
            position: absolute;
            width: 125px;
            height: 51px;
            right: 66px;
            top: 157px;
            background-image: url('New Project(1).png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* STEP 2. SLAY MINOTAUR Text Frame */
        .step-two-text {
            position: absolute;
            width: 188px;
            height: 31px;
            left: calc(50% - 188px/2 - 11.5px);
            top: 212px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 13px;
            line-height: 16px;
            color: #14325C;
        }

        /* New Project 1 Image Asset Frame */
        .graphic-step-two {
            position: absolute;
            width: 169px;
            height: 68px;
            left: calc(50% - 169px/2 - 25px);
            top: 247px;
            background-image: url('New Project.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* STEP 3. ESCAPE LABYRINTH Text Frame */
        .step-three-text {
            position: absolute;
            width: 188px;
            height: 31px;
            left: calc(50% - 188px/2 + 8.5px);
            top: 315px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 13px;
            line-height: 16px;
            text-align: right;
            color: #14325C;
        }

        /* New Project(2) 1 Image Asset Frame */
        .graphic-step-three {
            position: absolute;
            width: 191px;
            height: 78px;
            right: 14px;
            top: 347px;
            background-image: url('New Project(2).png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* STEP 4. ENTER KNOSSOS PALACE Text Frame */
        .step-four-text {
            position: absolute;
            width: 210px;
            height: 38px;
            left: calc(50% - 210px/2 - 0.5px);
            top: 421px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 13px;
            line-height: 16px;
            color: #14325C;
        }

        /* New Project(3) 1 Image Asset Frame */
        .graphic-step-four {
            position: absolute;
            width: 51px;
            height: 67px;
            left: calc(50% - 51px/2 - 84px);
            top: 459px;
            background-image: url('New Project(3).png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* =========================================================
           ACTION PLAY CTA COMPONENT (Rectangle 7 + PLAY)
           ========================================================= */
        .play-game-action-btn {
            box-sizing: border-box;
            position: absolute;
            width: 228px;
            height: 78px;
            left: calc(50% - 228px/2 + 0.5px);
            top: 540px;
            
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 24px;
            line-height: 30px;
            color: #14325C;
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .play-game-action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="initial-beginnings-container">
        <div class="blur-bg-ellipse"></div>
        
        <div class="inner-panel-card">
            
            <img src="logo.svg" alt="LINORINTH" class="logo-vector">
            
            <a href="info-page.html" class="back-nav-button">←</a>
            
            <div class="step-one-text">STEP 1. FIND SWORD</div>
            <div class="graphic-step-one"></div>
            
            <div class="step-two-text">STEP 2. SLAY MINOTAUR</div>
            <div class="graphic-step-two"></div>
            
            <div class="step-three-text">STEP 3. ESCAPE LABYRINTH</div>
            <div class="graphic-step-three"></div>
            
            <div class="step-four-text">STEP 4. ENTER KNOSSOS PALACE</div>
            <div class="graphic-step-four"></div>
            
            <a href="game.html" class="play-game-action-btn" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">PLAY</a>
            
        </div>
    </div>

</body>
</html>

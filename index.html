<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linorinth - Language Selection</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@500&family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">

    <script src="translations.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
        }

        /* Language Screen Base Frame Canvas Wrapper */
        .screen-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 3 Background Blur */
        .blur-bg {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2 + 3px);
            top: -164px;
            bottom: 496px;
            background: rgba(255, 255, 255, 0.8);
            filter: blur(150px);
            pointer-events: none;
            z-index: 10;
        }

        .inner-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;
            font-family: 'IM Fell Double Pica', serif;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .logo-vector {
            width: 201px;
            height: 54px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .welcome-title {
            font-size: 32px;
            line-height: 38px;
            text-align: center;
            letter-spacing: 0.05em;
            color: #14325C;
            margin-bottom: 4px;
            font-weight: 400;
        }

        .subtitle {
            font-size: 22px;
            line-height: 28px;
            text-align: center;
            color: #14325C;
            margin-bottom: 30px;
        }

        .languages-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px 16px;
            width: 100%;
            max-width: 280px;
            margin-top: auto;
            margin-bottom: auto; /* Centers the whole button grid dynamically in the available space */
        }

        /* Global Structural Language Action Option Reset Styles */
        .lang-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
            width: 100%;
        }
        .lang-button:hover {
            opacity: 0.85;
        }
        .lang-button:active {
            transform: scale(0.97);
        }

        /* FIX 5: Standardized flag graphics globally so they size evenly */
        .flag-asset {
            width: 93px;
            height: 57px;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 4px;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.08);
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .flag-english { background-image: url('decorative_assets/England.png'); }
        .flag-greece  { background-image: url('decorative_assets/Greece.png'); }
        .flag-germany { background-image: url('decorative_assets/Germany.png'); }
        .flag-france  { background-image: url('decorative_assets/France.png'); }

        .lang-label {
            width: 100%;
            font-size: 20px;
            line-height: 24px;
            text-align: center;
            color: #14325C;
            white-space: normal;
            word-wrap: break-word;
        }

        .label-greece {
            font-family: 'Arima', system-ui;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="screen-container">
    <div class="blur-bg"></div>

    <div class="inner-card">

        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <h1 class="welcome-title" data-i18n="welcome">WELCOME</h1>
        <p class="subtitle" data-i18n="select_lang">Select your language</p>

        <div class="languages-grid">

            <a href="info-page.html" class="lang-button" onclick="setLanguage('en')">
                <div class="flag-asset flag-english"></div>
                <div class="lang-label">English</div>
            </a>

            <a href="info-page.html" class="lang-button" onclick="setLanguage('el')">
                <div class="flag-asset flag-greece"></div>
                <div class="lang-label label-greece">Ελληνικά</div>
            </a>

            <a href="info-page.html" class="lang-button" onclick="setLanguage('de')">
                <div class="flag-asset flag-germany"></div>
                <div class="lang-label">Deutsch</div>
            </a>

            <a href="info-page.html" class="lang-button" onclick="setLanguage('fr')">
                <div class="flag-asset flag-france"></div>
                <div class="lang-label">Français</div>
            </a>

        </div>

    </div>
</div>

</body>
</html>

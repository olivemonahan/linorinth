<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linorinth - Virtual Queue Position</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">

    <script src="translations.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Join Screen Base Canvas */
        .join-screen-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 (Blurred Background Circle) */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2 + 3px);
            top: -164px;
            bottom: 496px;
            background: rgba(255, 255, 255, 0.8);
            filter: blur(150px);
            pointer-events: none;
            z-index: 10;
        }

        /* MATCHED FIX 1: Auto layout vertical column container matching info-page */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        /* MATCHED FIX 2: Relativized Logo asset */
        .logo-vector {
            width: 201px;
            height: 54px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        /* MATCHED FIX 3: Cleaned text block for auto layout wrapping */
        .position-header-text {
            font-size: 20px;
            line-height: 25px;
            text-align: center;
            color: #14325C;
            margin-bottom: 12px;
        }

        /* MATCHED FIX 4: Kept the structured visual container but removed position absolute */
        .queue-badge-container {
            position: relative; /* Allows number positioning context inside badge */
            width: 159px;
            height: 157px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .queue-badge-box {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            background: #C16868;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 30px;
        }

        .queue-position-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 96px;
            line-height: 96px;
            text-align: center;
            color: #410C0C;
            z-index: 2;
            pointer-events: none;
        }

        /* MATCHED FIX 5: Standardized text wrapping block */
        .play-promo-text {
            font-size: 24px;
            line-height: 30px;
            text-align: center;
            color: #14325C;
            max-width: 280px;
            margin-bottom: 16px;
        }

        /* Combined visual assets row container for arrow + graphic */
        .indicators-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 50px;
            margin-bottom: 16px;
            position: relative;
        }

        /* MATCHED FIX 6: Cleaned up Arrow metrics using modern centering instead of static pixel offsets */
        .indicator-arrow-line {
            box-sizing: border-box;
            width: 45px;
            height: 0;
            border: 2px solid #000000;
            transform: rotate(90deg);
            position: relative;
        }

        .indicator-arrow-line::after {
            content: '';
            position: absolute;
            right: -10px;
            top: -5px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #000000;
        }

        .decorative-image-layer {
            position: absolute;
            right: 15px;
            width: 68px;
            height: 50px;
            background-image: url('decorative_assets/image.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* MATCHED FIX 7: Synced button properties directly with info-page layout metrics */
        .join-game-action-btn {
            box-sizing: border-box;
            width: 228px;
            height: 78px;
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 18px;

            font-size: 24px;
            line-height: 30px;
            color: #14325C;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            margin-bottom: auto; /* Pushes component balance naturally downwards */
            flex-shrink: 0;
        }

        .join-game-action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="join-screen-container">
    <div class="blur-bg-ellipse"></div>

    <div class="inner-panel-card">

        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <div class="position-header-text" data-i18n="position_header">YOU ARE POSITION</div>

        <div class="queue-badge-container">
            <div class="queue-badge-box"></div>
            <div class="queue-position-number">54</div>
        </div>

        <div class="play-promo-text" data-i18n="play_promo">
            IN LINE<br>Play Linorinth for an opportunity to win and SKIP THE LINE
        </div>

        <div class="indicators-row">
            <div class="indicator-arrow-line"></div>
            <div class="decorative-image-layer"></div>
        </div>

        <a href="initial-beginnings.html" class="join-game-action-btn">JOIN GAME</a>

    </div>
</div>

</body>
</html>

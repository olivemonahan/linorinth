<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Screen - Virtual Queue Position</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Join Screen Base Canvas */
        .join-screen-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 (Blurred Background Circle) */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2);
            top: -178px;
            bottom: 510px;
            background: #D9D9D9;
            filter: blur(150px);
            pointer-events: none;
        }

        /* Rectangle 5 (Inner Panel Base Frame) */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;
        }

        /* Vector */
        .logo-vector {
            position: absolute;
            width: 201.16px;
            height: 54.35px;
            left: 50%;
            transform: translateX(-50%);
            top: 49.28px;
        }

        /* YOU ARE POSITION Text Block */
        .position-header-text {
            position: absolute;
            width: 223px;
            height: 123px;
            left: calc(50% - 223px/2 - 1px);
            top: 130px;
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 20px;
            line-height: 25px;
            text-align: center;
            color: #14325C;
        }

        /* Rectangle 4 (Red Queue Badge Frame) */
        .queue-badge-box {
            box-sizing: border-box;
            position: absolute;
            width: 159px;
            height: 157px;
            left: calc(50% - 159px/2 - 1px);
            top: 157px;
            background: #C16868;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 30px;
        }

        /* 54 (Queue Numeric Value Counter) */
        .queue-position-number {
            position: absolute;
            width: 92px;
            height: 120px;
            left: calc(50% - 92px/2 - 3.5px);
            top: 163px;
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 96px;
            line-height: 120px;
            text-align: center;
            color: #410C0C;
            z-index: 2;
            pointer-events: none;
        }

        /* IN LINE Play Linorinth Segment Promotional Text Wrapper */
        .play-promo-text {
            position: absolute;
            width: 264px;
            height: 150px;
            left: calc(50% - 264px/2 - 0.5px);
            top: 322px;
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 24px;
            line-height: 30px;
            text-align: center;
            color: #14325C;
        }

        /* Arrow 1 (Perfectly Centered Line Stem + Pointing Arrowhead) */
        .indicator-arrow-line {
            box-sizing: border-box;
            position: absolute;
            width: 45px;
            height: 0;
            left: 50%;
            top: 472px;
            border: 2px solid #000000;
            transform: translateX(-50%) rotate(90deg);
        }

        /* Dynamically injects the arrowhead triangle onto the end of the line stem */
        .indicator-arrow-line::after {
            content: '';
            position: absolute;
            right: -10px; /* Positions arrowhead at the terminal end of the line */
            top: -5px;   /* Centers the arrow tip vertically relative to the stem width */
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 8px solid #000000; /* Matches exact line color settings */
        }

        /* image 1 (Decorative Mini Asset Box Layer) */
        .decorative-image-layer {
            position: absolute;
            width: 68px;
            height: 50px;
            left: 243px;
            top: 467px;
            background-image: url('decorative_assets/image.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Combined Rectangle 2 + Rectangle 6 + JOIN GAME Element */
        .join-game-action-btn {
            box-sizing: border-box;
            position: absolute;
            width: 228px;
            height: 78px;
            left: calc(50% - 228px/2 - 1.5px);
            top: 517px;
            
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 24px;
            line-height: 30px;
            color: #14325C;
            
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .join-game-action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="join-screen-container">
        <div class="blur-bg-ellipse"></div>
        
        <div class="inner-panel-card">
            
            <img src="logo.svg" alt="LINORINTH" class="logo-vector">
            
            <div class="position-header-text">YOU ARE POSITION</div>
            
            <div class="queue-badge-box"></div>
            <div class="queue-position-number">54</div>
            
            <div class="play-promo-text">
                IN LINE<br>Play Linorinth for an opportunity to win and SKIP THE LINE
            </div>
            
            <div class="indicator-arrow-line"></div>
            
            <div class="decorative-image-layer"></div>
            
            <a href="game.html" class="join-game-action-btn" style="text-decoration: none; display: flex; justify-content: center; align-items: center;">JOIN GAME</a>
            
        </div>
    </div>

</body>
</html>

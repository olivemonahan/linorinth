<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">

    <script src="translations.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Game over Container Canvas */
        .game-over-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2 + 3px);
            top: -164px;
            bottom: 496px;
            background: rgba(255, 255, 255, 0.8);
            filter: blur(150px);
            pointer-events: none;
            z-index: 10;
        }

        /* MATCHED FIX 1: Converted card panel into a vertical column flow matching info-page */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        /* MATCHED FIX 2: Relativized branding header asset */
        .logo-vector {
            width: 201px;
            height: 54px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        /* MATCHED FIX 3: Removed static limits to permit normal typographic wrapping */
        .game-over-title {
            font-size: 32px;
            line-height: 40px;
            text-align: center;
            letter-spacing: 0.05em;
            color: #14325C;
            margin-bottom: 8px;
            font-weight: 400;
        }

        /* MATCHED FIX 4: Structured text flow container block */
        .defeat-status-text {
            font-size: 16px;
            line-height: 20px;
            text-align: center;
            color: #14325C;
            max-width: 240px;
            margin-bottom: 16px;
        }

        /* MATCHED FIX 5: Relativized graphic layer block */
        .decorative-graphic-layer {
            width: 201px;
            height: 82px;
            background: url('decorative_assets/kill_minotaur.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: auto; /* Pushes the subsequent menu button block to the baseline area */
            flex-shrink: 0;
        }

        /* MATCHED FIX 6: Centered layout column stack component using margin guidelines */
        .action-button-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 186px;
            gap: 10px;
            margin-bottom: 10px;
            filter: drop-shadow(0px 2px 1px rgba(0, 0, 0, 0.25));
            flex-shrink: 0;
        }

        /* Unified Shared Button Link Tokens */
        .menu-action-btn {
            box-sizing: border-box;
            width: 186px;
            height: 68px; /* Slightly adjusted to cleanly balance twin vertical elements within 633px frame */
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;

            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 20px;
            line-height: 25px;
            text-align: center;
            text-decoration: none;
            color: #14325C;

            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.2s;

            flex-shrink: 0;
        }

        .menu-action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="game-over-container">
    <div class="blur-bg-ellipse"></div>

    <div class="inner-panel-card">

        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <h1 class="game-over-title" data-i18n="game_over_title">GAME OVER</h1>

        <p class="defeat-status-text" data-i18n="defeat_status">The Minotaur has defeated you! Fight again or give up?</p>

        <div class="decorative-graphic-layer"></div>

        <div class="action-button-stack">
            <a href="initial-beginnings.html" class="menu-action-btn">REPLAY</a>
            <a href="join-screen.html" class="menu-action-btn">Exit game</a>
        </div>

    </div>
</div>

</body>
</html>

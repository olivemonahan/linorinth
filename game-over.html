<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Game over Container Canvas */
        .game-over-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        /* Ellipse 2 */
        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2 + 1.5px);
            top: -178px;
            bottom: 510px;
            background: #D9D9D9;
            filter: blur(150px);
            pointer-events: none;
        }

        /* Rectangle 5 Inner Panel */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;
        }

        /* Logo Header */
        .logo-vector {
            position: absolute;
            width: 201.16px;
            height: 54.35px;
            left: 50%;
            transform: translateX(-50%);
            top: 49.28px;
        }

        /* GAME OVER Header Text */
        .game-over-title {
            position: absolute;
            width: 257px;
            height: 114px;
            left: calc(50% - 257px/2 + 0.5px);
            top: 141px;
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 32px;
            line-height: 40px;
            text-align: center;
            letter-spacing: 0.05em;
            color: #14325C;
        }

        /* Defeat Status Informational Block */
        .defeat-status-text {
            position: absolute;
            width: 223px;
            height: 123px;
            left: calc(50% - 223px/2 - 1.5px);
            top: 194px;
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 16px;
            line-height: 20px;
            text-align: center;
            color: #14325C;
        }

        /* New Project 2 Graphic Frame */
        .decorative-graphic-layer {
            position: absolute;
            width: 201px;
            height: 82px;
            left: calc(50% - 201px/2 + 0.5px);
            top: 256px;
            background: url('decorative_assets/kill_minotaur.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Frame 2 - Auto Layout Button Group Wrapper */
        .action-button-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0px;
            gap: 10px;
            
            position: absolute;
            width: 186px;
            height: 166px; 
            left: 86px;
            top: 368px;
            
            filter: drop-shadow(0px 2px 1px rgba(0, 0, 0, 0.25));
        }

        /* Unified Shared Button Link Tokens */
        .menu-action-btn {
            box-sizing: border-box;
            width: 186px;
            height: 78px;
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            
            font-family: 'IM Fell Double Pica', serif;
            font-style: normal;
            font-weight: 400;
            font-size: 20px;
            line-height: 25px;
            text-align: center;
            text-decoration: none; /* Removes link underline */
            color: #14325C;
            
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.2s;
            
            flex: none;
            align-self: stretch;
            flex-grow: 0;
        }

        .menu-action-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="game-over-container">
        <div class="blur-bg-ellipse"></div>
        
        <div class="inner-panel-card">
            
            <img src="logo.svg" alt="LINORINTH" class="logo-vector">
            
            <h1 class="game-over-title">GAME OVER</h1>
            <p class="defeat-status-text">The Minotaur has defeated you! Fight again or give up?</p>
            
            <div class="decorative-graphic-layer"></div>
            
            <div class="action-button-stack">
                <a href="initial-beginnings.html" class="menu-action-btn">REPLAY</a>
                
                <a href="join-screen.html" class="menu-action-btn">Exit game</a>
            </div>
            
        </div>
    </div>

</body>
</html>

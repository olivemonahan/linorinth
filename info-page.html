<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Page - Virtual Queue</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+Double+Pica&display=swap" rel="stylesheet">
    <script src="translations.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8;
            font-family: 'IM Fell Double Pica', serif;
        }

        /* Base mobile frame */
        .info-page-container {
            position: relative;
            width: 361px;
            height: 660px;
            background: #C1DEE4;
            overflow: hidden;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
        }

        .blur-bg-ellipse {
            position: absolute;
            width: 227px;
            left: calc(50% - 227px/2 + 3px);
            top: -164px;
            bottom: 496px;
            background: rgba(255, 255, 255, 0.8);
            filter: blur(150px);
            pointer-events: none;
            z-index: 10;
        }

        /* FIX 1: Transformed container card into a vertical flex column layout */
        .inner-panel-card {
            position: absolute;
            width: 340px;
            height: 633px;
            left: 11px;
            top: 10px;
            background: #D3E8EC;
            border-radius: 30px;

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            box-sizing: border-box;
        }

        /* FIX 2: Relativized assets so they fit cleanly in the document flow */
        .logo-vector {
            width: 201px;
            height: 54px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        /* FIX 3: Removed position: absolute, width, and height so text wraps natively */
        .virtual-queue-title {
            font-size: 24px;
            line-height: 30px;
            text-align: center;
            color: #14325C;
            margin-bottom: 12px;
            font-weight: bold;
        }

        /* FIX 4: Allowed text blocks to scale heights organically */
        .instruction-text {
            font-size: 16px;
            line-height: 20px;
            text-align: center;
            color: #14325C;
            max-width: 260px;
            margin-bottom: 14px;
        }

        .qr-code-graphic {
            width: 178px;
            height: 90px;
            background-image: url('decorative_assets/people_in_line.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 10px;
            margin-bottom: 18px;
            flex-shrink: 0;
        }

        /* FIX 5: Combined label + selector drop wrapper into a horizontal row block */
        .visitors-row-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 280px;
            gap: 12px;
            margin-bottom: 22px;
        }

        .visitors-label {
            flex: 1;
            font-size: 15px;
            line-height: 18px;
            text-align: right;
            color: #14325C;
        }

        .dropdown-wrapper {
            width: 96px;
            height: 37px;
            flex-shrink: 0;
        }

        .dropdown-menu-select {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            padding: 0 24px 0 8px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-radius: 5px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 13px;
            color: #D3E8EC;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background: #14325C url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23D3E8EC'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e") no-repeat right 4px center;
            background-size: 16px;
        }

        /* FIX 6: Cleaned button positioning and decoupled it from static offsets */
        .join-button-action {
            box-sizing: border-box;
            width: 228px;
            height: 68px;
            background: #F9B271;
            border: 5px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0px 2px 1px rgba(0, 0, 0, 0.25);
            border-radius: 18px;
            font-family: 'IM Fell Double Pica', serif;
            font-size: 18px;
            line-height: 22px;
            color: #14325C;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
            margin-bottom: auto; /* Automatically pushes subsequent queue size elements down */
            flex-shrink: 0;
        }

        .join-button-action:hover {
            opacity: 0.9;
        }

        /* FIX 7: Aligned bottom counter items inline to cleanly isolate layout growth */
        .queue-counter-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .queue-size-label {
            font-size: 16px;
            line-height: 20px;
            color: #14325C;
            text-align: right;
        }

        .queue-number-value {
            font-size: 44px;
            line-height: 44px;
            color: #B80D0D;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="info-page-container">
    <div class="blur-bg-ellipse"></div>

    <div class="inner-panel-card">
        <img src="logo.svg" alt="LINORINTH" class="logo-vector">

        <div class="virtual-queue-title" data-i18n="virtual_queue">Virtual Queue</div>

        <div class="instruction-text" data-i18n="queue_instruction">
            Join the Virtual Line and wait until your position decreases to 1. Then, proceed to admissions gates.
        </div>

        <div class="qr-code-graphic"></div>

        <div class="visitors-row-container">
            <div class="visitors-label" data-i18n="visitors_label">Number of Visitors in Your Group:</div>
            <div class="dropdown-wrapper">
                <label>
                    <select class="dropdown-menu-select">
                        <option value="" disabled selected hidden data-i18n="select_placeholder">Select</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5+</option>
                    </select>
                </label>
            </div>
        </div>

        <a href="join-screen.html" class="join-button-action" data-i18n="join_line">JOIN VIRTUAL LINE</a>

        <div class="queue-counter-row">
            <div class="queue-size-label" data-i18n="queue_size">Current Queue Size:</div>
            <div class="queue-number-value">53</div>
        </div>
    </div>
</div>

</body>
</html>
